pretrained_model_path: base_models/sd15/full
output_dir: models/dreambooth_full_sd15
subject_name: dog
unique_token: kqwei
prompt_templates_path: configs/prompt_templates.yaml
subject_class_map:
  dog: dog

instance_data_root: data/processed/instance
class_data_root: data/processed/class
with_prior_preservation: true
prior_loss_weight: 1.0
class_images_per_instance: 200
class_gen_batch_size: 4
class_gen_guidance_scale: 7.5
class_gen_num_inference_steps: 30

resolution: 512
center_crop: false
dataloader_num_workers: 4

train_batch_size: 1
gradient_accumulation_steps: 1
max_train_steps: 400
learning_rate: 0.000005
text_encoder_learning_rate: 0.000005
train_text_encoder: false
max_grad_norm: 1.0

lr_scheduler: constant
lr_warmup_steps: 0
adam_beta1: 0.9
adam_beta2: 0.999
adam_weight_decay: 0.01
adam_epsilon: 0.00000001

mixed_precision: fp16
seed: 4782
log_with: null

checkpointing_steps: 50
validation_steps: 50
tail_checkpointing_start_step: 300
tail_checkpointing_steps: 25
tail_validation_start_step: 300
tail_validation_steps: 25
num_validation_images: 4
validation_guidance_scale: 7.5
validation_steps_infer: 30
